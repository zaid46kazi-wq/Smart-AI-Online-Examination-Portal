<!DOCTYPE html>
<html>
<head>
    <title>Online Exam - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-secondary d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 25rem; border-radius: 12px;">
        <h3 class="text-center fw-bold mb-4 text-primary">Login Platform</h3>
        <div id="lblMsg" class="text-danger fw-bold d-block mb-2"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="txtUsername" class="form-control" required="required">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="txtPassword" class="form-control" required="required">
            </div>
            <div class="mb-4">
                <label class="form-label">Select Role</label>
                <select id="ddlRole" class="form-select">
                    <option value="Student">Student</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
        </form>
        
        <div class="mt-4 p-2 bg-light border rounded text-center text-muted small">
            <strong>Admin Default:</strong> admin / admin123<br />
            <strong>Student Default:</strong> student1 / pass1
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('txtUsername').value.trim();
            const password = document.getElementById('txtPassword').value.trim();
            const role = document.getElementById('ddlRole').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.role === 'Admin') window.location.href = '/admin.html';
                else window.location.href = '/student.html';
            } else {
                document.getElementById('lblMsg').innerText = "Invalid Username, Password, or Role.";
            }
        });
    </script>
</body>
</html>
