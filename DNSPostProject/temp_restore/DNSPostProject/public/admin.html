<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">Admin Workspace</span>
            <button id="btnLogout" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>
    <div class="container pb-5">
        <div id="lblMsg" class="text-success fw-bold d-block mb-3 fs-5"></div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-primary text-white fw-bold">Add Question</div>
                    <div class="card-body">
                        <form id="addQuestionForm">
                            <textarea id="txtQuestion" class="form-control mb-2" placeholder="Question Text" required></textarea>
                            <input type="text" id="txtOpA" class="form-control mb-2" placeholder="Option A" required>
                            <input type="text" id="txtOpB" class="form-control mb-2" placeholder="Option B" required>
                            <input type="text" id="txtOpC" class="form-control mb-2" placeholder="Option C" required>
                            <input type="text" id="txtOpD" class="form-control mb-3" placeholder="Option D" required>
                            <label class="form-label text-muted small">Correct Option</label>
                            <select id="ddlCorrect" class="form-select mb-3">
                                <option value="A">Option A</option>
                                <option value="B">Option B</option>
                                <option value="C">Option C</option>
                                <option value="D">Option D</option>
                            </select>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Save Question</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-secondary text-white fw-bold">Manage All Questions</div>
                    <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
                        <table class="table table-striped table-hover mb-0" id="questionsTable">
                            <thead>
                                <tr>
                                    <th>ID</th><th>Question</th><th>Answer</th><th>Action</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white fw-bold">Student Exam Results</div>
                    <div class="card-body p-0">
                        <table class="table table-striped mb-0" id="resultsTable">
                            <thead>
                                <tr>
                                    <th>Student</th><th>Score</th><th>Completed At</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showMsg(txt, isError=false) {
            const l = document.getElementById('lblMsg');
            l.innerText = txt;
            l.className = isError ? 'text-danger fw-bold d-block mb-3 fs-5' : 'text-success fw-bold d-block mb-3 fs-5';
            setTimeout(() => l.innerText = '', 3000);
        }

        async function loadQuestions() {
            const res = await fetch('/api/questions');
            if (!res.ok) { window.location.href = '/'; return; }
            const data = await res.json();
            const tb = document.querySelector('#questionsTable tbody');
            tb.innerHTML = '';
            data.forEach(q => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${q.Id}</td><td>${q.QuestionText}</td><td>${q.CorrectOption}</td>
                                <td><button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.Id})">Delete</button></td>`;
                tb.appendChild(tr);
            });
        }

        async function loadResults() {
            const res = await fetch('/api/results');
            if (res.ok) {
                const data = await res.json();
                const tb = document.querySelector('#resultsTable tbody');
                tb.innerHTML = '';
                data.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${r.Username}</td><td>${r.Score}</td><td>${new Date(r.ExamDate).toLocaleString()}</td>`;
                    tb.appendChild(tr);
                });
            }
        }

        async function deleteQuestion(id) {
            if(!confirm('Delete this question?')) return;
            const res = await fetch(`/api/questions/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMsg('Question deleted!');
                loadQuestions();
            } else showMsg('Failed to delete', true);
        }

        document.getElementById('addQuestionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                QuestionText: document.getElementById('txtQuestion').value,
                OptionA: document.getElementById('txtOpA').value,
                OptionB: document.getElementById('txtOpB').value,
                OptionC: document.getElementById('txtOpC').value,
                OptionD: document.getElementById('txtOpD').value,
                CorrectOption: document.getElementById('ddlCorrect').value
            };
            const res = await fetch('/api/questions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                showMsg('Question added successfully!');
                e.target.reset();
                loadQuestions();
            } else showMsg('Error adding question.', true);
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });

        loadQuestions();
        loadResults();
    </script>
</body>
</html>
