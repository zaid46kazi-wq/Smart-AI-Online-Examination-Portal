<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow text-center p-5" style="border-radius: 15px;">
        <h1 class="display-1 text-success fw-bold" id="lblScore"></h1>
        <h3 class="mt-3">Exam Submitted Successfully!</h3>
        <p class="text-muted">Your score has been saved to the leaderboard.</p>
        <button id="btnBack" class="btn btn-primary mt-4 py-2 px-4 shadow-sm fw-bold">Back to Dashboard</button>
    </div>

    <script>
        const score = localStorage.getItem('LastScore');
        if (score === null) window.location.href = '/';
        
        document.getElementById('lblScore').innerText = score + " / 10";

        document.getElementById('btnBack').addEventListener('click', () => {
            localStorage.removeItem('LastScore');
            window.location.href = '/student.html';
        });
    </script>
</body>
</html>
